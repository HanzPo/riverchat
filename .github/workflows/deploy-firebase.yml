name: Deploy Firebase

on:
  push:
    branches: [main]

concurrency:
  group: deploy-firebase
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Functions & Rules
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build Cloud Functions
        run: npm run build
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      - name: Deploy to Firebase
        run: firebase deploy --only functions,firestore,database,storage --project riverchat-ac2f0 --force

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/sa.json
